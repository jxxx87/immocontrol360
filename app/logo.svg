<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 512">
  <defs>
    <style>
      text { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      .cls-1 { fill: #dbeafe; } /* Lightest */
      .cls-2 { fill: #3b82f6; } /* Medium */
      .cls-3 { fill: #1d4ed8; } /* Medium-Dark */
      .cls-4 { fill: #1e3a8a; } /* Darkest */
      .text-main { font-size: 200px; font-weight: 700; fill: #0ea5e9; }
      .text-sub { font-size: 100px; font-weight: 500; fill: #64748b; }
    </style>
  </defs>
  <!-- Icon Group -->
  <g id="icon">
    <!-- Top Left -->
    <rect class="cls-1" x="0" y="0" width="244" height="244" rx="40" />
    <!-- Top Right -->
    <rect class="cls-2" x="268" y="0" width="244" height="244" rx="40" />
    <!-- Bottom Left -->
    <rect class="cls-2" x="0" y="268" width="244" height="244" rx="40" />
    <!-- Bottom Right -->
    <rect class="cls-4" x="268" y="268" width="244" height="244" rx="40" />
  </g>
  
  <!-- Text Group -->
  <text x="600" y="240" class="text-main">ImmoControl</text>
  <text x="600" y="380" class="text-sub">Pro 360</text>
</svg>
